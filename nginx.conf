server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;

    # ── Static assets with long cache ─────────────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── API proxies ───────────────────────────────────────────────────────

    location /api/opensky-auth/ {
        proxy_pass https://auth.opensky-network.org/;
        proxy_ssl_server_name on;
        proxy_set_header Host auth.opensky-network.org;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/opensky/ {
        proxy_pass https://opensky-network.org/api/;
        proxy_ssl_server_name on;
        proxy_set_header Host opensky-network.org;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/rainviewer-tiles/ {
        proxy_pass https://tilecache.rainviewer.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host tilecache.rainviewer.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_valid 200 10m;
        expires 10m;
        add_header Cache-Control "public, max-age=600";
    }

    location /api/rainviewer/ {
        proxy_pass https://api.rainviewer.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.rainviewer.com;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── AIS WebSocket relay ───────────────────────────────────────────────
    # Nginx uses OpenSSL, which handles the TLS renegotiation that
    # aisstream.io requires (unlike Chrome's BoringSSL).
    location /ws/ais {
        proxy_pass https://stream.aisstream.io/v0/stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host stream.aisstream.io;
        proxy_ssl_server_name on;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
