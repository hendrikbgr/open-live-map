services:
  app:
    build:
      context: .
      args:
        VITE_OPENSKY_CLIENT_ID: ${VITE_OPENSKY_CLIENT_ID:-}
        VITE_OPENSKY_CLIENT_SECRET: ${VITE_OPENSKY_CLIENT_SECRET:-}
        VITE_AISSTREAM_API_KEY: ${VITE_AISSTREAM_API_KEY:-}
    container_name: open-live-map
    ports:
      - "8080:80"
    restart: unless-stopped
